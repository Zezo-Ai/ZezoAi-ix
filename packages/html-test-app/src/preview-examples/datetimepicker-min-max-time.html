<!DOCTYPE html>
<html lang="en" data-ix-theme="classic" data-ix-color-schema="system">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Datetimepicker min/max time example</title>
  </head>
  <body>
    <ix-datetime-picker
      from="2026/04/18"
      time="12:00:00"
      min-time="09:00:00"
      max-time="17:30:00"
    ></ix-datetime-picker>
    <script type="module" src="./init.js"></script>
  </body>
</html>
